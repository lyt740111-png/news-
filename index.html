<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبض العالم | أخبار مفصلة بالذكاء الاصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e63946; --dark: #1d3557; --light: #f1faee; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .news-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .news-img { width: 100%; height: 200px; object-fit: cover; }
        .news-content { padding: 15px; }
        .read-btn { display: block; width: 100%; text-align: center; background: var(--primary); color: white; padding: 10px; text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-family: 'Cairo'; }
        
        /* تصميم نافذة قراءة المقال المفصل */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); overflow-y: auto; }
        .modal-content { background-color: white; margin: 5% auto; padding: 30px; border-radius: 15px; width: 90%; max-width: 800px; position: relative; }
        .close-btn { position: absolute; top: 15px; left: 20px; font-size: 30px; font-weight: bold; cursor: pointer; color: red; }
        .article-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 10px; margin-bottom: 20px; }
        .article-body { font-size: 18px; line-height: 1.8; color: #333; margin-bottom: 30px;}
        .comments-section { border-top: 2px solid #ddd; padding-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>📰 نبض العالم الإخباري</h1>
        <p>تغطية شاملة ومقالات مفصلة تُدار بالذكاء الاصطناعي بنسبة 100%</p>
    </header>

    <div class="news-grid" id="news-container">
        <h3 style="text-align:center; width: 100%;">جاري تحميل أحدث التقارير...</h3>
    </div>

    <!-- نافذة قراءة المقال المفصل -->
    <div id="articleModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modalImg" class="article-img" src="" alt="صورة الخبر">
            <h2 id="modalTitle" style="color: var(--dark);"></h2>
            <p style="color: gray; font-size: 14px;" id="modalDate"></p>
            <div id="modalBody" class="article-body"></div>
            
            <!-- قسم التعليقات (Disqus) -->
            <div class="comments-section">
                <h3>💬 التعليقات</h3>
                <div id="disqus_thread"></div>
            </div>
        </div>
    </div>

    <script>
        let allNews =[];

        async function fetchNews() {
            try {
                const response = await fetch('news.json');
                allNews = await response.json();
                displayNews(allNews);
            } catch (error) {
                document.getElementById('news-container').innerHTML = "<h3>لم يتم العثور على أخبار. تأكد من تشغيل البوت.</h3>";
            }
        }

        function displayNews(newsArray) {
            const container = document.getElementById('news-container');
            container.innerHTML = "";
            newsArray.forEach((news, index) => {
                const card = `
                    <div class="news-card">
                        <img src="${news.image}" class="news-img" alt="صورة">
                        <div class="news-content">
                            <span style="color: #e63946; font-weight: bold; font-size: 12px;">${news.category}</span>
                            <h3 style="margin: 10px 0;">${news.title}</h3>
                            <button class="read-btn" onclick="openArticle(${index})">اقرأ التقرير المفصل 📖</button>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function openArticle(index) {
            const news = allNews[index];
            document.getElementById('modalTitle').innerText = news.title;
            document.getElementById('modalImg').src = news.image;
            document.getElementById('modalDate').innerText = "تاريخ النشر: " + news.date;
            document.getElementById('modalBody').innerHTML = news.detailed_article;
            document.getElementById('articleModal').style.display = "block";

            // تحميل وتحديث تعليقات Disqus بناءً على ID الخبر
            loadDisqus(news.id, news.original_link);
        }

        function closeModal() {
            document.getElementById('articleModal').style.display = "none";
        }

        // إعداد نظام تعليقات Disqus
        function loadDisqus(newsId, newsUrl) {
            // === مهم جداً: ضع اسم موقعك في ديسكاس هنا ===
            var disqus_shortname = 'YOUR_DISQUS_SHORTNAME'; 
            
            if (window.DISQUS) {
                DISQUS.reset({
                    reload: true,
                    config: function () {  
                        this.page.identifier = newsId;  
                        this.page.url = "https://yourwebsite.com/news#" + newsId;
                    }
                });
            } else {
                window.disqus_config = function () {
                    this.page.identifier = newsId;
                    this.page.url = "https://yourwebsite.com/news#" + newsId;
                };
                (function() {
                    var d = document, s = d.createElement('script');
                    s.src = 'https://' + disqus_shortname + '.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                })();
            }
        }

        fetchNews();
    </script>
</body>
</html>
