<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأنباء العالمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #e63946; --s: #1d3557; --bg: #f8f9fa; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 0; text-align: right; }
        header { background: var(--s); color: white; padding: 20px; text-align: center; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; overflow-y:auto; }
        .modal-content { background: white; max-width: 800px; margin: 20px auto; padding: 30px; border-radius: 10px; }
        .status-msg { text-align: center; padding: 50px; font-size: 20px; color: var(--s); }
    </style>
</head>
<body>

<header>
    <h1>🌐 وكالة الأنباء العالمية المستقلة</h1>
</header>

<div class="container">
    <div id="status" class="status-msg">جاري الاتصال بقاعدة البيانات...</div>
    <div class="grid" id="news-grid"></div>
</div>

<div id="newsModal" class="modal">
    <div class="modal-content">
        <button onclick="closeModal()" style="background:red; color:white; border:none; padding:10px; cursor:pointer;">إغلاق X</button>
        <h1 id="m-title"></h1>
        <img id="m-img" src="" style="width:100%; border-radius:10px;">
        <div id="m-body" style="line-height:2; font-size:18px; margin-top:20px;"></div>
    </div>
</div>

<script>
    let allNews = [];

    async function loadNews() {
        const statusEl = document.getElementById('status');
        const gridEl = document.getElementById('news-grid');

        try {
            // حل المشكلة الجذري: إضافة رقم عشوائي (timestamp) لنهاية الرابط لمنع المتصفح من قراءة النسخة القديمة
            const response = await fetch('news.json?nocache=' + new Date().getTime());
            
            if (!response.ok) throw new Error("الملف غير موجود");

            allNews = await response.json();

            if (allNews.length === 0) {
                statusEl.innerText = "قاعدة البيانات فارغة حالياً، البوت يعمل على جلب الأخبار...";
            } else {
                statusEl.style.display = 'none';
                renderGrid();
            }
        } catch (error) {
            console.error(error);
            statusEl.innerText = "⚠️ فشل تحميل الأخبار. تأكد من أن البوت أنهى أول مهمة له بنجاح.";
        }
    }

    function renderGrid() {
        const gridEl = document.getElementById('news-grid');
        gridEl.innerHTML = "";
        allNews.forEach((n, i) => {
            gridEl.innerHTML += `
                <div class="card" onclick="openNews(${i})">
                    <img src="${n.image}">
                    <div class="card-body">
                        <small style="color:red; font-weight:bold;">${n.category}</small>
                        <h3 style="margin:10px 0;">${n.title}</h3>
                        <p style="font-size:12px; color:gray;">🗓️ ${n.date}</p>
                    </div>
                </div>
            `;
        });
    }

    function openNews(i) {
        const n = allNews[i];
        document.getElementById('m-title').innerText = n.title;
        document.getElementById('m-img').src = n.image;
        document.getElementById('m-body').innerHTML = n.body;
        document.getElementById('newsModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('newsModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // تشغيل التحميل
    loadNews();
</script>
</body>
</html>
