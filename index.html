<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبض العالم | أخبار بالذكاء الاصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e63946; --dark: #1d3557; --light: #f1faee; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: var(--dark); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-weight: 900; letter-spacing: 1px; }
        header p { margin: 5px 0 0; color: #a8dadc; font-size: 14px; }
        
        .filters { text-align: center; padding: 20px; background: white; margin-bottom: 20px; }
        .filter-btn { background: none; border: 2px solid var(--dark); color: var(--dark); padding: 8px 20px; border-radius: 20px; cursor: pointer; margin: 5px; font-family: 'Cairo'; font-weight: bold; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: var(--dark); color: white; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 0 20px 40px; max-width: 1200px; margin: auto; }
        .news-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: transform 0.3s; position: relative; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .news-img { width: 100%; height: 180px; object-fit: cover; }
        .category-badge { position: absolute; top: 10px; right: 10px; background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .importance-badge { position: absolute; top: 10px; left: 10px; background: #ffb703; color: var(--dark); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .news-content { padding: 15px; }
        .news-title { font-size: 18px; font-weight: 700; color: var(--dark); margin: 0 0 10px; line-height: 1.4; }
        .news-date { font-size: 12px; color: #888; }
        .read-more { display: inline-block; margin-top: 15px; color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>📰 نبض العالم</h1>
        <p>أخبار مجمّعة ومصنّفة ومُرتبة بواسطة الذكاء الاصطناعي</p>
    </header>

    <div class="filters" id="filters-container">
        <!-- الأزرار ستضاف هنا برمجياً -->
    </div>

    <div class="news-grid" id="news-container">
        <h3 style="text-align:center; width: 100%;">جاري تحميل الأخبار...</h3>
    </div>

    <script>
        let allNews =[];

        async function fetchNews() {
            try {
                // قراءة ملف الـ JSON الذي يصنعه البوت
                const response = await fetch('news.json');
                allNews = await response.json();
                
                extractCategories();
                displayNews(allNews);
            } catch (error) {
                document.getElementById('news-container').innerHTML = "<h3 style='text-align:center; color:red;'>عذراً، لم يتم العثور على أخبار بعد. سيبدأ البوت بالعمل قريباً.</h3>";
            }
        }

        function extractCategories() {
            const categories =["الكل", ...new Set(allNews.map(n => n.category))];
            const filterContainer = document.getElementById('filters-container');
            filterContainer.innerHTML = "";
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `filter-btn ${cat === 'الكل' ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => filterNews(cat, btn);
                filterContainer.appendChild(btn);
            });
        }

        function filterNews(category, btnElement) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            if (category === "الكل") {
                displayNews(allNews);
            } else {
                const filtered = allNews.filter(n => n.category === category);
                displayNews(filtered);
            }
        }

        function displayNews(newsArray) {
            const container = document.getElementById('news-container');
            container.innerHTML = "";

            newsArray.forEach(news => {
                const card = `
                    <div class="news-card">
                        <span class="category-badge">${news.category}</span>
                        ${news.importance >= 8 ? '<span class="importance-badge">🔥 عاجل ومهم</span>' : ''}
                        <img src="${news.image}" class="news-img" alt="صورة الخبر">
                        <div class="news-content">
                            <h3 class="news-title">${news.title}</h3>
                            <span class="news-date">⏳ ${news.date}</span><br>
                            <a href="${news.original_link}" target="_blank" class="read-more">اقرأ التفاصيل 🔗</a>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // تشغيل الدالة عند فتح الصفحة
        fetchNews();
    </script>
</body>
</html>
