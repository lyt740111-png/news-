name: Build Admin APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: false
        default: '1.0.0'
  push:
    paths:
      - 'admin-app/**'
    branches:
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Show Android SDK Info
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          ls "$SDK/platforms/" || true
          ls "$SDK/build-tools/" || true

      - name: Create local.properties
        run: |
          SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "sdk.dir=$SDK" > admin-app/local.properties
          cat admin-app/local.properties

      - name: Setup Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "GRADLE_HOME=/tmp/gradle-8.4" >> $GITHUB_ENV
          echo "/tmp/gradle-8.4/bin" >> $GITHUB_PATH
          /tmp/gradle-8.4/bin/gradle --version

      - name: Generate Gradle Wrapper
        working-directory: admin-app
        run: |
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew
          ls -la gradle/wrapper/

      - name: Build Debug APK
        working-directory: admin-app
        run: |
          SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          export ANDROID_HOME="$SDK"
          export ANDROID_SDK_ROOT="$SDK"
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee /tmp/build.log
          echo "Exit code: ${PIPESTATUS[0]}"

      - name: Show Build Errors (if failed)
        if: failure()
        run: |
          echo "=== LAST 200 LINES OF BUILD LOG ==="
          tail -200 /tmp/build.log || echo "No log found"

      - name: Find APK
        id: apk
        run: |
          APK=$(find admin-app -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          echo "Found: $APK"
          echo "path=$APK" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldNewsAdmin-v${{ github.event.inputs.version || '1.0.0' }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: admin-v${{ github.event.inputs.version || '1.0.0' }}
          name: "Admin App v${{ github.event.inputs.version || '1.0.0' }}"
          body: |
            ## لوحة تحكم بوابة الأنباء العالمية

            ### كيفية التثبيت:
            1. حمّل ملف APK من قسم Assets أدناه
            2. على هاتفك: الإعدادات - الأمان - السماح بمصادر غير معروفة
            3. افتح ملف الـ APK وثبّته

            ### الميزات:
            - اضافة وتعديل وحذف الأخبار
            - ادارة التصنيفات
            - تشغيل بوت الأخبار يدوياً
            - تعديل ملفات الموقع مباشرة
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
