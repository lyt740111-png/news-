name: Build Admin APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: false
        default: '1.0.0'
  push:
    paths:
      - 'admin-app/**'
    branches:
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "SDK path: $SDK"
          echo "sdk.dir=$SDK" > admin-app/local.properties
          echo "Platforms available:"
          ls "$SDK/platforms/" 2>/dev/null || true
          echo "Build-tools available:"
          ls "$SDK/build-tools/" 2>/dev/null || true

      - name: Setup Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "/tmp/gradle-8.4/bin" >> $GITHUB_PATH
          /tmp/gradle-8.4/bin/gradle --version

      - name: Build Debug APK
        working-directory: admin-app
        run: |
          SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          export ANDROID_HOME="$SDK"
          export ANDROID_SDK_ROOT="$SDK"
          echo "=== Starting build with Gradle ==="
          gradle assembleDebug --no-daemon --stacktrace

      - name: Find and Upload APK
        run: |
          APK=$(find admin-app -name "*debug*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "debug APK not found, searching all apks..."
            find admin-app -name "*.apk" -type f
            exit 1
          fi
          echo "Found APK: $APK"
          ls -lh "$APK"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldNewsAdmin-v${{ github.event.inputs.version || '1.0.0' }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: admin-v${{ github.event.inputs.version || '1.0.0' }}
          name: "Admin App v${{ github.event.inputs.version || '1.0.0' }}"
          body: |
            ## لوحة تحكم بوابة الأنباء العالمية

            ### كيفية التثبيت:
            1. حمّل ملف APK من قسم Assets أدناه
            2. على هاتفك: الإعدادات - الأمان - السماح بمصادر غير معروفة
            3. افتح ملف الـ APK وثبّته

            ### الميزات:
            - اضافة وتعديل وحذف الأخبار
            - ادارة التصنيفات
            - تشغيل بوت الأخبار يدوياً
            - تعديل ملفات الموقع مباشرة
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
