name: Build Admin APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: false
        default: '1.0.0'
  push:
    paths:
      - 'admin-app/**'
    branches:
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5

      - name: Download Gradle 8.4 and Generate Wrapper
        working-directory: admin-app
        run: |
          GRADLE_VERSION=8.4
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O gradle.zip
          unzip -q gradle.zip
          export PATH="$PWD/gradle-${GRADLE_VERSION}/bin:$PATH"
          gradle wrapper --gradle-version=${GRADLE_VERSION} --distribution-type=bin
          chmod +x gradlew
          rm -rf gradle.zip gradle-${GRADLE_VERSION}

      - name: Build Debug APK
        working-directory: admin-app
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find APK
        id: apk
        run: |
          APK=$(find admin-app -name "*.apk" -type f | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"
          ls -lh "$APK"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldNewsAdmin-v${{ github.event.inputs.version || '1.0.0' }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: admin-v${{ github.event.inputs.version || '1.0.0' }}
          name: "Admin App v${{ github.event.inputs.version || '1.0.0' }}"
          body: |
            ## لوحة تحكم بوابة الأنباء العالمية

            ### كيفية التثبيت:
            1. حمّل ملف APK من قسم Assets أدناه
            2. على هاتفك: الإعدادات - الأمان - السماح بمصادر غير معروفة
            3. افتح ملف الـ APK وثبّته

            ### الميزات:
            - اضافة وتعديل وحذف الأخبار
            - ادارة التصنيفات
            - تشغيل بوت الأخبار يدوياً
            - تعديل ملفات الموقع مباشرة
            - عرض سجل GitHub Actions
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
